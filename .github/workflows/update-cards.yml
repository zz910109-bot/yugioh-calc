name: Update Card Database
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all cards from YGOPRODECK
        run: |
          python3 - <<'EOF'
          import urllib.request, json, time

          all_cards = []
          offset = 0
          batch = 500

          while True:
              url = f"https://db.ygoprodeck.com/api/v7/cardinfo.php?num={batch}&offset={offset}"
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      data = json.loads(r.read())
                  cards = data.get('data', [])
                  if not cards:
                      break
                  all_cards.extend(cards)
                  print(f"Fetched {len(all_cards)} cards...")
                  if len(cards) < batch:
                      break
                  offset += batch
                  time.sleep(0.5)
              except Exception as e:
                  print(f"Error: {e}")
                  break

          slim = []
          for c in all_cards:
              ban = c.get('banlist_info', {})
              lim = 3
              b = ban.get('ban_tcg', '')
              if b == 'Banned': lim = 0
              elif b == 'Limited': lim = 1
              elif b == 'Semi-Limited': lim = 2
              slim.append({
                  'id': c['id'],
                  'en': c['name'],
                  'type': c.get('type', ''),
                  'race': c.get('race', ''),
                  'attr': c.get('attribute', ''),
                  'limit': lim
              })

          with open('cards-en.json', 'w', encoding='utf-8') as f:
              json.dump(slim, f, ensure_ascii=False)
          print(f"Saved {len(slim)} cards")
          EOF

      - name: Fetch Chinese names from ygocdb
        run: |
          python3 - <<'EOF'
          import urllib.request, json, zipfile, io

          zh_map = {}
          try:
              url = "https://ygocdb.com/api/v0/cards.zip"
              with urllib.request.urlopen(url, timeout=60) as r:
                  data = r.read()
              with zipfile.ZipFile(io.BytesIO(data)) as z:
                  cards = json.loads(z.read(z.namelist()[0]))
              for cid, info in cards.items():
                  en = info.get('en', {}).get('name', '')
                  if en:
                      zh_map[en] = {
                          'tc': info.get('tc', {}).get('name', ''),
                          'sc': info.get('sc', {}).get('name', ''),
                          'ja': info.get('ja', {}).get('name', '')
                      }
              print(f"Loaded {len(zh_map)} names")
          except Exception as e:
              print(f"Failed: {e}")

          with open('cards-zh.json', 'w', encoding='utf-8') as f:
              json.dump(zh_map, f, ensure_ascii=False)
          EOF

      - name: Merge into cards.json
        run: |
          python3 - <<'EOF'
          import json

          with open('cards-en.json', encoding='utf-8') as f:
              en_cards = json.load(f)
          with open('cards-zh.json', encoding='utf-8') as f:
              zh_map = json.load(f)

          merged = []
          for c in en_cards:
              zh = zh_map.get(c['en'], {})
              merged.append({
                  'id': c['id'],
                  'en': c['en'],
                  'tc': zh.get('tc', ''),
                  'sc': zh.get('sc', ''),
                  'ja': zh.get('ja', ''),
                  'type': c['type'],
                  'race': c['race'],
                  'attr': c['attr'],
                  'limit': c['limit']
              })

          with open('cards.json', 'w', encoding='utf-8') as f:
              json.dump(merged, f, ensure_ascii=False, separators=(',', ':'))
          print(f"Done: {len(merged)} cards")
          EOF
          rm -f cards-en.json cards-zh.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards.json
          git diff --staged --quiet || git commit -m "chore: update card database $(date -u +%Y-%m-%d)"
          git push
